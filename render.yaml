services:
  - type: web
    name: personal-worklog
    runtime: node
    plan: free
    buildCommand: npm install && npx prisma generate && npm run build
    startCommand: npx prisma migrate deploy && npm run start
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: DATABASE_URL
        fromDatabase:
          name: personal-worklog-db
          property: connectionString
      - key: BETTER_AUTH_SECRET
        generateValue: true
      - key: BETTER_AUTH_URL
        sync: false
      - key: ENCRYPTION_KEY
        generateValue: true

databases:
  - name: personal-worklog-db
    plan: free
    databaseName: personal_worklog
    user: worklog
